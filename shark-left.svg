<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 140 70">
  <style>
    .wiggle { transform-origin: 70px 35px; animation: shark-wiggle 0.5s ease-in-out infinite alternate; }
    @keyframes shark-wiggle { from { transform: rotate(-2.5deg); } to { transform: rotate(2.5deg); } }
  </style>
  <g class="wiggle">
    <image href="shark-left.png" x="0" y="0" width="140" height="70" preserveAspectRatio="xMidYMid meet"/>
  </g>
</svg>

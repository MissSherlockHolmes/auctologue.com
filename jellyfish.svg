<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 180" width="140" height="180">
  <defs>
    <radialGradient id="bellGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#e0f2fe;stop-opacity:0.75" />
      <stop offset="85%" style="stop-color:#bae6fd;stop-opacity:0.55" />
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:0.4" />
    </radialGradient>
    <linearGradient id="tentacleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4e8f8;stop-opacity:0.7" />
      <stop offset="70%" style="stop-color:#93c5fd;stop-opacity:0.45" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.25" />
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes pulse {
      0%, 100% { transform: scale(1, 1); opacity: 0.88; }
      45% { transform: scale(1.04, 0.98); opacity: 0.95; }
      90% { transform: scale(0.98, 1.03); opacity: 0.9; }
    }
    @keyframes sway1 {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      30% { transform: translateX(2px) rotate(1deg); }
      60% { transform: translateX(-1px) rotate(-0.5deg); }
    }
    @keyframes sway2 {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      40% { transform: translateX(-2px) rotate(-1deg); }
      70% { transform: translateX(1px) rotate(0.5deg); }
    }
    @keyframes drift {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }
    .bell { animation: pulse 3.2s ease-in-out infinite; transform-origin: 70px 62px; }
    .tentacles-1 { animation: sway1 4s ease-in-out infinite; transform-origin: 70px 78px; }
    .tentacles-2 { animation: sway2 4.5s ease-in-out infinite 0.8s; transform-origin: 70px 78px; }
    .tentacles-3 { animation: sway1 3.8s ease-in-out infinite 0.4s; transform-origin: 70px 78px; }
    .jellyfish { animation: drift 7s ease-in-out infinite; }
  </style>
  <g class="jellyfish" filter="url(#soft)">
    <!-- Bell: dome with ruffled margin (wavy bottom edge) -->
    <path class="bell" d="
      M 22 58
      C 22 28 42 14 70 14
      C 98 14 118 28 118 58
      C 118 62 116 66 114 69
      C 110 75 100 78 92 78
      C 85 78 78 76 74 72
      C 72 70 70 67 69 64
      C 68 62 68 60 70 58
      C 72 56 75 55 78 55
      C 82 55 85 57 86 60
      C 87 63 85 66 82 68
      C 78 71 72 72 70 72
      C 68 72 66 70 66 68
      C 66 65 69 62 72 61
      C 74 60 76 60 77 61
      C 78 63 77 65 75 66
      C 72 68 68 68 66 66
      C 64 63 65 59 68 57
      C 55 58 42 62 32 68
      C 26 72 22 68 22 58 Z
    " fill="url(#bellGrad)" stroke="rgba(186,230,253,0.5)" stroke-width="0.8"/>
    <!-- Simpler ruffled bell (cleaner path) -->
    <path class="bell" d="
      M 28 56
      C 28 24 48 12 70 12
      C 92 12 112 24 112 56
      L 108 62
      Q 105 68 98 72
      Q 85 78 70 78
      Q 55 78 42 72
      Q 35 68 32 62
      L 28 56 Z
    " fill="url(#bellGrad)" stroke="rgba(186,230,253,0.45)" stroke-width="0.7"/>
    <!-- Inner highlight (gelatinous depth) -->
    <ellipse class="bell" cx="70" cy="38" rx="28" ry="14" fill="rgba(255,255,255,0.35)" />
    <ellipse class="bell" cx="68" cy="32" rx="12" ry="5" fill="rgba(255,255,255,0.25)" />
    <!-- Tentacles: multiple, varying length, S-curves -->
    <g class="tentacles-1">
      <path fill="none" stroke="url(#tentacleGrad)" stroke-width="1.2" stroke-linecap="round" d="M 38 78 Q 34 95 36 115 Q 38 132 35 148 Q 33 162 32 175"/>
      <path fill="none" stroke="url(#tentacleGrad)" stroke-width="1.1" stroke-linecap="round" d="M 48 78 Q 46 98 48 118 Q 50 138 48 158"/>
      <path fill="none" stroke="url(#tentacleGrad)" stroke-width="1.3" stroke-linecap="round" d="M 58 79 Q 56 100 58 122 Q 60 142 57 165"/>
    </g>
    <g class="tentacles-2">
      <path fill="none" stroke="url(#tentacleGrad)" stroke-width="1.2" stroke-linecap="round" d="M 70 79 Q 70 102 70 125 Q 70 148 70 172"/>
      <path fill="none" stroke="url(#tentacleGrad)" stroke-width="1.1" stroke-linecap="round" d="M 80 78 Q 82 98 80 118 Q 78 138 80 158"/>
      <path fill="none" stroke="url(#tentacleGrad)" stroke-width="1.2" stroke-linecap="round" d="M 92 78 Q 96 95 94 115 Q 92 132 95 148 Q 97 162 98 175"/>
    </g>
    <g class="tentacles-3">
      <path fill="none" stroke="url(#tentacleGrad)" stroke-width="1" stroke-linecap="round" d="M 52 78 Q 50 92 52 108 Q 54 125 52 142"/>
      <path fill="none" stroke="url(#tentacleGrad)" stroke-width="1" stroke-linecap="round" d="M 88 78 Q 90 92 88 108 Q 86 125 88 142"/>
    </g>
  </g>
</svg>

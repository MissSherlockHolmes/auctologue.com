<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAA CS 2026 Survey — Auctologue</title>
  <meta name="description" content="NAA C&amp;S 2026 Auctologue survey — share your feedback." />
  <link rel="canonical" href="https://auctologue.com/NAA_CS_2026_Survey" />
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="../icon128.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Pinyon+Script&display=swap" rel="stylesheet" />
  <style>
    :root {
      --text-primary: #e5e7eb;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --bg: #0b1220;
      --border: #1f2937;
      --panel: #111827;
      --radius: 18px;
      --max: 1120px;
      --page-bg: radial-gradient(circle at 8% 0%, rgba(59, 130, 246, 0.22), transparent 42%), radial-gradient(circle at 92% 12%, rgba(59, 130, 246, 0.15), transparent 38%), linear-gradient(180deg, #162744 0%, #111f35 26%, #0f1a2d 55%, var(--bg) 100%);
      --nav-bg: #1b3760;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--text-primary);
      background: var(--page-bg);
      line-height: 1.6;
      min-height: 100vh;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    .topbar {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      width: calc(100% + 40px);
      margin-left: -20px;
      margin-right: -20px;
      padding: 12px 20px 16px;
      background: var(--nav-bg);
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-family: "Pinyon Script", cursive;
      font-size: clamp(1.9rem, 2.8vw, 2.4rem);
      color: var(--text-primary);
      line-height: 1;
      user-select: none;
    }

    .brand-mark img {
      width: 64px;
      height: 64px;
      object-fit: contain;
    }

    .hero {
      text-align: center;
      padding-top: clamp(34px, 9vw, 92px);
      padding-bottom: clamp(8px, 2vw, 16px);
    }

    .hero h1 {
      font-size: clamp(2.3rem, 8.2vw, 4.4rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .hero .gradient {
      background: linear-gradient(90deg, #4ade80 0%, #60a5fa 55%, #818cf8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero .laser-green {
      color: #4ade80;
      text-shadow: 0 0 10px rgba(74, 222, 128, 0.6), 0 0 20px rgba(34, 197, 94, 0.4);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(0.75rem, 2vw, 1.1rem);
      max-width: 52rem;
      margin: clamp(12px, 3vw, 28px) auto 0;
      overflow: hidden;
    }

    .form-embed {
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      line-height: 0;
    }

    .form-embed iframe {
      display: block;
      width: 100%;
      min-height: 72vh;
      height: 5200px;
      border: 0;
    }

    @media (max-width: 640px) {
      .form-embed iframe {
        height: 5600px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand-mark">
        <img src="../Aucto_Hat_Transparent.png" alt="" width="64" height="64" decoding="async" />
        <span>Auctologue</span>
      </div>
    </header>

    <main>
      <section class="hero">
        <h1>Share <span class="laser-green">Your</span> <span class="gradient">Feedback</span></h1>
      </section>
      <article class="card">
        <div class="form-embed">
          <iframe
            title="NAA C&amp;S 2026 Auctologue Survey"
            src="https://docs.google.com/forms/d/e/1FAIpQLScFOY3-KCuLFF0Rn4wNX_IFPCKOYS9aJ2N0Da2co49csb0NTA/viewform?embedded=true"
            allowfullscreen
          >Loading survey…</iframe>
        </div>
      </article>
    </main>
  </div>
</body>
</html>
